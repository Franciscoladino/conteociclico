<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conteo Cíclico</title>

   <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2850/2850341.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        .upload-area { background: #ebf2f7; padding: 20px; border: 2px dashed #1a73e8; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #1a73e8; border-radius: 6px; font-size: 16px; outline: none; }

        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; font-size: 13px; }
        th { background-color: #1a73e8; color: white !important; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .loc-cell { background-color: #f9f9f9; font-weight: bold; text-align: center; color: #1a73e8; border-left: 1px solid #eee; }
        
        .input-conteo { width: 70px; padding: 8px; border: 1px solid #1a73e8; border-radius: 4px; text-align: center; font-weight: bold; }
        .diff-cell { font-weight: bold; text-align: center; min-width: 45px; border-radius: 4px; border: 1px solid #ddd; padding: 5px; }

        /* SECCIÓN DE FIRMAS */
        .signatures { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .sig-box { flex: 1; min-width: 280px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 1px solid #ccc; background: #fff; width: 100%; height: 140px; touch-action: none; border-radius: 4px; cursor: crosshair; }
        
        .input-nombre-firma { width: 90%; margin-top: 8px; padding: 8px; border: none; border-bottom: 1px solid #1a73e8; text-align: center; font-weight: bold; outline: none; background: transparent; }
        .btn-clear { background: #95a5a6; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; margin-top: 5px; }

        .btn-print { background: #27ae60; color: white; padding: 15px; border: none; width: 100%; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .upload-area, .search-input, button, .btn-print, .btn-clear { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            th { background-color: #f0f0f0 !important; color: black !important; border: 1px solid #000; }
            td { border: 1px solid #ccc; }
            .input-conteo { border: none !important; background: transparent !important; }
            .input-nombre-firma { border: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 CONTEO CÍCLICO DE INVENTARIO</h1>

    <div class="upload-area">
        <strong>Cargar Excel Diario</strong><br><br>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <p id="info" style="color: #27ae60; font-size: 12px; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <input type="text" id="buscador" class="search-input" placeholder="🔍 Buscar por nombre o número de artículo...">

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Nro Art.</th>
                    <th>Descripción</th>
                    <th>Almacén</th>
                    <th>Pasillo </th>
                    <th>Ppl. </th>
                    <th>Niv. </th>
                    <th>Sist.</th>
                    <th>Físico</th>
                    <th>Dif.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="signatures">
        <div class="sig-box">
            <canvas id="pad1"></canvas>
            <button type="button" class="btn-clear" onclick="limpiar('pad1')">Limpiar Firma IT</button>
            <input type="text" class="input-nombre-firma" placeholder="Nombre De Jefe / Auditor">
        </div>
        <div class="sig-box">
            <canvas id="pad2"></canvas>
            <button type="button" class="btn-clear" onclick="limpiar('pad2')">Limpiar Firma Almacén</button>
            <input type="text" class="input-nombre-firma" placeholder="Nombre Responsable Almacén">
        </div>
    </div>

    <button class="btn-print" onclick="window.print()">🖨️ GENERAR REPORTE PDF / IMPRIMIR</button>
</div>

<script>
    if ("ServiceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("sw.js").then(reg => {
                console.log("PWAlista y registrada", reg);
                }).catch(err => {
                    console.log("Error al registrar PWA", err);
                });
        });
    }
</script>

<script>
    // Limpieza de nombres de columnas para seguridad
    function cleanKey(text) {
        if (!text) return "";
        return text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "").trim();
    }

    document.getElementById('excelFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        const file = e.target.files[0];
        if (!file) return;

        reader.readAsArrayBuffer(file);
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // Usamos header:1 para obtener una matriz pura y evitar problemas de nombres
            let rows = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
            
            // Quitamos la primera fila (encabezados)
            const headers = rows.shift(); 

            // ORDENAR POR UBICACIÓN FÍSICA (Pasillo: col 4, Papelera: col 5, Nivel: col 6)
            rows.sort((a, b) => {
                let p1 = String(a[4] || ""), p2 = String(b[4] || "");
                let res = p1.localeCompare(p2, undefined, {numeric: true});
                if (res !== 0) return res;
                
                let pap1 = String(a[5] || ""), pap2 = String(b[5] || "");
                let res2 = pap1.localeCompare(pap2, undefined, {numeric: true});
                if (res2 !== 0) return res2;

                return String(a[6] || "").localeCompare(String(b[6] || ""), undefined, {numeric: true});
            });

            renderTabla(rows);
            document.getElementById('info').innerText = "✓ " + rows.length + " artículos cargados y ordenados.";
        };
    });

    function renderTabla(datos) {
        const tbody = document.querySelector("#mainTable tbody");
        tbody.innerHTML = "";

        datos.forEach((row, i) => {
            // MAPEO POR POSICIÓN DE COLUMNA (A=0, B=1, C=2, D=3, E=4, F=5, G=6)
            const nroArt  = row[0] || '---'; 
            const nombre  = row[1] || '---'; 
            const almacen = row[2] || '---'; 
            const sistema = parseFloat(row[3]) || 0; 
            const pasillo = row[4] || '-';   
            const papelera= row[5] || '-';   
            const nivel   = row[6] || '-';   

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${nroArt}</strong></td>
                <td>${nombre}</td>
                <td>${almacen}</td>
                <td class="loc-cell">${pasillo}</td>
                <td class="loc-cell">${papelera}</td>
                <td class="loc-cell">${nivel}</td>
                <td style="text-align:center; font-weight:bold;">${sistema}</td>
                <td><input type="number" class="input-conteo" oninput="doMath(${i}, this.value, ${sistema})"></td>
                <td id="diff-${i}" class="diff-cell">-</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function doMath(idx, fis, sis) {
        const cell = document.getElementById(`diff-${idx}`);
        if (fis === "") { cell.innerText = "-"; cell.style.background = "transparent"; return; }
        const res = fis - sis;
        cell.innerText = res > 0 ? "+" + res : res;
        cell.style.background = (res === 0) ? "#d4edda" : "#f8d7da";
        cell.style.color = (res === 0) ? "#155724" : "#721c24";
    }

    // Buscador interactivo
    document.getElementById('buscador').addEventListener('keyup', function() {
        const val = this.value.toLowerCase();
        document.querySelectorAll("#mainTable tbody tr").forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    });

    // Lógica de Firmas (Canvas)
    function initPad(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        let draw = false;
        
        // Ajuste de resolución
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        const pos = (e) => {
            const r = canvas.getBoundingClientRect();
            return {
                x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left,
                y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top
            };
        };

        const start = (e) => { draw = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); };
        const move = (e) => { 
            if(!draw) return; 
            e.preventDefault(); 
            const p = pos(e); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
        };
        
        canvas.addEventListener("mousedown", start);
        canvas.addEventListener("mousemove", move);
        canvas.addEventListener("touchstart", start, {passive:false});
        canvas.addEventListener("touchmove", move, {passive:false});
        window.addEventListener("mouseup", () => draw = false);
        window.addEventListener("touchend", () => draw = false);
        
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";
    }

    function limpiar(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.onload = () => { initPad("pad1"); initPad("pad2"); };
</script>

</body>
</html>
